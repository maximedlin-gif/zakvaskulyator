<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b5793a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Закваскулятор">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<title>Отзыв · Закваскулятор</title>
</head>
<body>
<main class="feedback-page">
  <div class="app-head feedback-head">
    <div class="logo">🫙</div>
    <div>
      <div class="ttl">Отзыв о Закваскуляторе</div>
      <div class="sub">быстрый текст для тестирования без входа в аккаунт</div>
    </div>
  </div>

  <div class="card">
    <div class="callout">Форма ничего не отправляет сама. Она собирает текст на этом устройстве: скопируйте отзыв и отправьте Максиму удобным способом.</div>

    <div class="field">
      <label>Что проверяли</label>
      <select id="fb-area" class="input">
        <option>Калькулятор теста</option>
        <option>Прогноз готовности</option>
        <option>Профили заквасок</option>
        <option>Обучение</option>
        <option>Журнал и трекер</option>
        <option>Установка PWA</option>
        <option>Другое</option>
      </select>
    </div>

    <div class="field">
      <label>Что получилось</label>
      <textarea id="fb-done" class="input textarea" rows="4" placeholder="Например: рассчитал ржаную закваску 1:2:3, прогноз показал готовность к утру."></textarea>
    </div>

    <div class="field">
      <label>Что было непонятно или сломалось</label>
      <textarea id="fb-problem" class="input textarea" rows="4" placeholder="Опишите экран, действие и что ожидали увидеть."></textarea>
    </div>

    <div class="field">
      <label>Устройство и браузер</label>
      <input id="fb-device" class="input" type="text">
    </div>

    <div class="field">
      <label>Контакт для уточнения, если можно</label>
      <input id="fb-contact" class="input" type="text" placeholder="Можно оставить пустым">
    </div>

    <button class="btn" id="fb-build" type="button">Собрать отзыв</button>
  </div>

  <div class="card">
    <h3>Готовый текст</h3>
    <textarea id="fb-output" class="input textarea feedback-output" rows="10" readonly placeholder="Нажмите «Собрать отзыв»"></textarea>
    <button class="btn ghost" id="fb-copy" type="button">Скопировать</button>
    <div class="callout ok hidden" id="fb-status"></div>
  </div>

  <a class="btn ghost feedback-back" href="index.html">Назад в приложение</a>
</main>
<script src="feedback.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
